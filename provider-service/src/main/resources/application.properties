# Server
server.port=8082

# Application name
spring.application.name=provider-service

# MySQL DataSource (provider has its own separate DB)
spring.datasource.url=jdbc:mysql://localhost:3306/provider_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Auth Service URL (used by AuthClient to validate tokens)
auth.service.url=http://localhost:8080
