# Server
server.port=8083

# Application name
spring.application.name=review-service

# MySQL DataSource (review has its own separate DB)
spring.datasource.url=jdbc:mysql://localhost:3306/review_db?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Auth Service URL (for token validation)
auth.service.url=http://localhost:8080

# Provider Service URL (for pushing updated ratings)
provider.service.url=http://localhost:8082
